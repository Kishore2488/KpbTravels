version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: kpb-travels-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb123
    volumes:
      - mongo_data:/data/db
    networks:
      - kpb-network

  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: kpb-travels-api
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:mongodb123@mongo:27017/kpb-travels?authSource=admin
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: kpb-travels-dev-secret
    depends_on:
      - mongo
    volumes:
      - ../../backend:/app
    networks:
      - kpb-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: kpb-travels-web
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - kpb-network

volumes:
  mongo_data:

networks:
  kpb-network:
    driver: bridge
