name: KPB Travels CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install backend dependencies
      run: |
        cd backend
        if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
          echo "Lockfile found — running npm ci"
          npm ci
        else
          echo "package-lock.json not found — falling back to npm install"
          npm install
        fi

    - name: Lint backend
      run: |
        cd backend
        npm run lint
      continue-on-error: true

    - name: Test backend
      run: |
        cd backend
        npm test
      continue-on-error: true

    - name: Install frontend dependencies
      run: |
        cd frontend
        if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
          echo "Lockfile found — running npm ci"
          npm ci
        else
          echo "package-lock.json not found — falling back to npm install"
          npm install
        fi

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./deployment/docker/Dockerfile.backend
        push: true
        tags: |
          env.REGISTRY/{{ github.repository_owner }}/api:latest 
          env.REGISTRY/{{ github.repository_owner }}/api:${{ github.sha }}


    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./deployment/docker/Dockerfile.frontend
        push: true
        tags: |
          env.REGISTRY/{{ github.repository_owner }}/frontend:latest
          env.REGISTRY/{{ github.repository_owner }}/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment/kubernetes/kpb-deployment.yml
        kubectl apply -f deployment/kubernetes/mongodb-statefulset.yml
        kubectl apply -f deployment/kubernetes/network-policy.yml
        kubectl rollout status deployment/kpb-api -n kpb-travels
        kubectl rollout status deployment/kpb-frontend -n kpb-travels
