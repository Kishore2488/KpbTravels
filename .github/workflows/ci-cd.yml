name: KPB Travels CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          #cache: npm

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint Backend
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Test Backend
        working-directory: backend
        run: npm test -- --passWithNoTests
        continue-on-error: true

      - name: Check Frontend
        id: frontend
        run: |
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Frontend Dependencies
        if: steps.frontend.outputs.exists == 'true'
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

  build:
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Convert GitHub owner to lowercase
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/api:latest
            ghcr.io/${{ env.OWNER_LC }}/api:${{ github.sha }}

      - name: Check Frontend
        id: frontend
        run: |
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Frontend Image
        if: steps.frontend.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}
      
      - name: Verify cluster
        run: kubectl get nodes
      - name: Create Namespace
        run: kubectl apply -f deployment/kubernetes/namespace.yml

      - name: Deploy MongoDB
        run: kubectl apply -f deployment/kubernetes/mongodb-statefulset.yml

      - name: Deploy Network Policy
        run: kubectl apply -f deployment/kubernetes/network-policy.yml

      - name: Deploy Application
        run: kubectl apply -f deployment/kubernetes/kpb-deployment.yml

      - name: Wait for Backend Rollout
        run: kubectl rollout status deployment/kpb-api -n kpb-travels --timeout=3000s

      - name: Wait for Frontend Rollout
        run: kubectl rollout status deployment/kpb-frontend -n kpb-travels --timeout=3000s
