apiVersion: v1
kind: Namespace
metadata:
  name: kpb-travels

---
apiVersion: v1
kind: Secret
metadata:
  name: kpb-secrets
  namespace: kpb-travels
type: Opaque
stringData:
  mongodb-uri: "mongodb+srv://admin:password@cluster.mongodb.net/kpb-travels?retryWrites=true&w=majority"
  jwt-secret: "kpb-travels-jwt-secret-key"
  node-env: "production"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kpb-config
  namespace: kpb-travels
data:
  PORT: "5000"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpb-api
  namespace: kpb-travels
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kpb-api
  template:
    metadata:
      labels:
        app: kpb-api
    spec:
      containers:
      - name: api
        image: kpbtravels/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kpb-secrets
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kpb-secrets
              key: jwt-secret
        - name: NODE_ENV
          valueFrom:
            secretKeyRef:
              name: kpb-secrets
              key: node-env
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: kpb-config
              key: PORT
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: kpb-api-service
  namespace: kpb-travels
spec:
  type: LoadBalancer
  selector:
    app: kpb-api
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpb-frontend
  namespace: kpb-travels
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kpb-frontend
  template:
    metadata:
      labels:
        app: kpb-frontend
    spec:
      containers:
      - name: frontend
        image: kpbtravels/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: kpb-frontend-service
  namespace: kpb-travels
spec:
  type: LoadBalancer
  selector:
    app: kpb-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kpb-api-hpa
  namespace: kpb-travels
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kpb-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
